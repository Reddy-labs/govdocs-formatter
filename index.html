<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovDocs Formatter - 100% Private File Resizer</title>
    <!-- Tailwind CSS for sleek UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Open-source libraries for client-side processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-6 shadow-md">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🇮🇳 GovDocs Formatter</h1>
            <span class="bg-blue-700 text-xs px-3 py-1.5 rounded-full font-medium flex items-center gap-1">
                🔒 100% Private (No Uploads)
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl w-full mx-auto px-4 py-8 flex-grow">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Sidebar: Controls -->
            <div class="md:col-span-1 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. Choose Target Portal</label>
                    <select id="portalPresets" class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="custom">Custom Dimensions</option>
                        <option value="passport-photo">Passport Seva - Photo (3.5x4.5cm, <100KB)</option>
                        <option value="passport-sign">Passport Seva - Signature (4.5x3.5cm, <100KB)</option>
                        <option value="epfo-doc">EPFO Passbook/UAN - PDF (<200KB)</option>
                        <option value="generic-pdf">Standard Portal - PDF (<500KB)</option>
                    </select>
                </div>

                <div class="border-t border-gray-100 pt-4 space-y-4">
                    <h3 class="text-sm font-semibold text-gray-700">2. Output Requirements</h3>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Max File Size</label>
                        <div class="flex items-center gap-2">
                            <input type="number" id="maxSize" value="200" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <span class="text-sm text-gray-500 font-medium">KB</span>
                        </div>
                    </div>

                    <div id="dimensionInputs" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Width (px)</label>
                            <input type="number" id="widthPx" value="800" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Height (px)</label>
                            <input type="number" id="heightPx" value="1000" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Convert To</label>
                        <select id="outputFormat" class="w-full p-2 border border-gray-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="application/pdf">PDF (.pdf)</option>
                            <option value="image/jpeg">JPEG (.jpg)</option>
                            <option value="image/png">PNG (.png)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Main Panel: File Dropper & Output -->
            <div class="md:col-span-2 flex flex-col justify-between space-y-6">
                <!-- Dropzone -->
                <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-blue-500 transition-colors cursor-pointer bg-gray-50 flex flex-col items-center justify-center min-h-[220px]">
                    <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf">
                    <span class="text-4xl mb-3">📄</span>
                    <p class="text-sm font-medium text-gray-700">Drag & drop your document here, or <span class="text-blue-600 underline">browse</span></p>
                    <p class="text-xs text-gray-400 mt-1">Accepts PDFs, JPEGs, and PNGs</p>
                </div>

                <!-- Status / Progress -->
                <div id="statusCard" class="hidden p-4 rounded-xl border flex items-center justify-between">
                    <div>
                        <p id="statusTitle" class="text-sm font-semibold"></p>
                        <p id="statusMeta" class="text-xs text-gray-500 mt-0.5"></p>
                    </div>
                    <a id="downloadBtn" class="hidden bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition-colors cursor-pointer">
                        📥 Download File
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Note -->
    <footer class="bg-gray-100 text-center py-4 text-xs text-gray-500 border-t border-gray-200">
        <p>Your documents never leave your computer. All rendering, compression, and resizing happen strictly in-browser.</p>
    </footer>

    <!-- Logic Script -->
    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const portalPresets = document.getElementById('portalPresets');
        const maxSizeInput = document.getElementById('maxSize');
        const widthInput = document.getElementById('widthPx');
        const heightInput = document.getElementById('heightPx');
        const formatSelect = document.getElementById('outputFormat');
        
        const statusCard = document.getElementById('statusCard');
        const statusTitle = document.getElementById('statusTitle');
        const statusMeta = document.getElementById('statusMeta');
        const downloadBtn = document.getElementById('downloadBtn');

        // Presets handling
        portalPresets.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val === 'passport-photo') {
                maxSizeInput.value = 100; widthInput.value = 413; heightInput.value = 531; // 3.5x4.5cm at 300 DPI approx
                formatSelect.value = 'image/jpeg';
            } else if (val === 'passport-sign') {
                maxSizeInput.value = 100; widthInput.value = 531; heightInput.value = 413;
                formatSelect.value = 'image/jpeg';
            } else if (val === 'epfo-doc' || val === 'generic-pdf') {
                maxSizeInput.value = val === 'epfo-doc' ? 200 : 500;
                formatSelect.value = 'application/pdf';
            }
        });

        // Event Listeners for Upload
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-50'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-blue-500', 'bg-blue-50'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            showStatus('Processing...', 'Running compression math strictly on your device...', 'info');
            
            const targetSizeKB = parseInt(maxSizeInput.value);
            const targetFormat = formatSelect.value;
            
            try {
                if (targetFormat.includes('image')) {
                    await processImage(file, targetSizeKB);
                } else if (targetFormat === 'application/pdf') {
                    await processPdf(file, targetSizeKB);
                }
            } catch (error) {
                console.error(error);
                showStatus('Error Processing File', 'Something went wrong during local processing. Ensure the file isn\'t password protected.', 'error');
            }
        }

        // Image optimization algorithm
        async function processImage(file, maxKB) {
            let options = {
                maxSizeMB: maxKB / 1024,
                maxWidthOrHeight: Math.max(parseInt(widthInput.value), parseInt(heightInput.value)),
                useWebWorker: true,
                fileType: formatSelect.value
            };

            // If incoming file is a PDF, we cannot easily parse it to an image natively in plain client JS without heavy weights like pdf.js
            if (file.type === 'application/pdf') {
                throw new Error("Converting PDF to Image entirely client-side requires heavy binary dependency wrappers. Please upload a source image.");
            }

            const compressedFile = await imageCompression(file, options);
            setupDownload(compressedFile, `formatted_${Date.now()}.${formatSelect.value.split('/')[1]}`);
        }

        // PDF Optimization using pdf-lib (Compressing by stripping structural bloat or embedding optimization)
        async function processPdf(file, maxKB) {
            let fileArrayBuffer;
            
            if (file.type.includes('image')) {
                // Wrap image into a new clean PDF container
                const pdfDoc = await PDFLib.PDFDocument.create();
                const imageBytes = await file.arrayBuffer();
                let embeddedImg = file.type === 'image/png' ? await pdfDoc.embedPng(imageBytes) : await pdfDoc.embedJpg(imageBytes);
                
                const page = pdfDoc.addPage([parseInt(widthInput.value) || 595, parseInt(heightInput.value) || 842]); // Defaults to A4 if empty
                page.drawImage(embeddedImg, { x: 0, y: 0, width: page.getWidth(), height: page.getHeight() });
                
                fileArrayBuffer = await pdfDoc.save();
            } else {
                // If it is already a PDF, read it, copy it to strip structural unreferenced objects (garbage collection compression)
                const srcBytes = await file.arrayBuffer();
                const srcDoc = await PDFLib.PDFDocument.load(srcBytes);
                const pdfDoc = await PDFLib.PDFDocument.create();
                const copiedPages = await pdfDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                copiedPages.forEach((page) => pdfDoc.addPage(page));
                
                fileArrayBuffer = await pdfDoc.save();
            }

            const blob = new Blob([fileArrayBuffer], { type: 'application/pdf' });
            
            if (blob.size / 1024 > maxKB) {
                showStatus('Warning: Size Limit Strictness', `Compressed to ${(blob.size / 1024).toFixed(1)}KB. If this exceeds your ${maxKB}KB limit, consider resizing dimensions lower or using an optimized black-and-white scan baseline.`, 'warning', blob);
            } else {
                setupDownload(blob, `formatted_${Date.now()}.pdf`);
            }
        }

        function showStatus(title, message, type, optionalBlob = null) {
            statusCard.classList.remove('hidden', 'bg-blue-50', 'border-blue-200', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200', 'bg-yellow-50', 'border-yellow-200');
            downloadBtn.classList.add('hidden');

            if (type === 'info') statusCard.classList.add('bg-blue-50', 'border-blue-200', 'text-blue-800');
            if (type === 'success') statusCard.classList.add('bg-green-50', 'border-green-200', 'text-green-800');
            if (type === 'warning') statusCard.classList.add('bg-yellow-50', 'border-yellow-200', 'text-yellow-800');
            if (type === 'error') statusCard.classList.add('bg-red-50', 'border-red-200', 'text-red-800');

            statusTitle.innerText = title;
            statusMeta.innerText = message;

            if (optionalBlob) {
                setupDownload(optionalBlob, `formatted_${Date.now()}.pdf`, false);
            }
        }

        function setupDownload(blob, filename, isPerfectSuccess = true) {
            const url = URL.createObjectURL(blob);
            downloadBtn.href = url;
            downloadBtn.download = filename;
            downloadBtn.classList.remove('hidden');
            
            if (isPerfectSuccess) {
                showStatus('✨ Success!', `File optimization complete! Output size: ${(blob.size / 1024).toFixed(1)} KB`, 'success');
                downloadBtn.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
